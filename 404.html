<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found</title>
    <link rel="icon" type="image/avif" href="/assets/favicon.avif" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Schibsted+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
      :root {
        --bg: #140e0b;
        --bg-alt: #1e1511;
        --text: #f8efe6;
        --muted: #d4c1b0;
        --line: rgba(255, 255, 255, 0.14);
        --accent: #f5a35c;
        --accent-2: #ff6e54;
        --accent-3: #91dbc0;
        --panel-strong: rgba(26, 18, 14, 0.96);
        --glow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 28px 80px rgba(0, 0, 0, 0.25);
        --font-heading: "Playfair Display", serif;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Schibsted Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(245, 163, 92, 0.16), transparent 28%),
          radial-gradient(circle at 86% 0%, rgba(255, 110, 84, 0.12), transparent 24%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 52%, var(--bg) 100%);
        padding: 2rem;
      }

      .layout {
        display: flex;
        align-items: flex-end;
        gap: 3rem;
      }

      .photo {
        height: 70vh;
        max-height: 680px;
        min-height: 320px;
        width: auto;
        object-fit: contain;
        object-position: bottom;
        flex-shrink: 0;
        filter: drop-shadow(0 24px 48px rgba(0,0,0,0.4));
      }

      .content {
        text-align: left;
        padding-bottom: 2rem;
      }

      @media (max-width: 640px) {
        .layout  { flex-direction: column-reverse; align-items: center; gap: 1.5rem; }
        .photo   { height: 40vh; }
        .content { text-align: center; }
      }

      body::before, body::after {
        content: "";
        position: fixed;
        width: 42rem;
        height: 42rem;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
        z-index: -1;
        animation: drift 24s ease-in-out infinite;
      }

      body::before { top: -18rem; right: -14rem; background: rgba(245, 163, 92, 0.56); }
      body::after  { left: -16rem; bottom: 6rem; background: rgba(255, 110, 84, 0.48); animation-delay: -10s; }

      .eyebrow {
        margin: 0 0 1rem;
        color: var(--accent-3);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: var(--font-heading);
        font-size: clamp(5rem, 18vw, 10rem);
        line-height: 1;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        margin: 0 0 2rem;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.8;
        max-width: 34ch;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.2rem;
        padding: 0.9rem 1.6rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        color: #130d0a;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 18px 34px rgba(245, 163, 92, 0.28);
        transition: transform 180ms ease;
      }

      a:hover { transform: translateY(-3px); }

      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50%       { transform: translate3d(0, 2rem, 0) scale(1.08); }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <img class="photo" src="/assets/404.avif" alt="Shaurya looking down" />
      <div class="content">
        <p class="eyebrow">Error 404</p>
        <h1>404</h1>
        <p>This page doesn't exist. Might've moved, might've never been here.</p>
        <a href="/">Back to home</a>
      </div>
    </div>
  </body>
</html>
