<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Live status page for shaurya.online with current uptime and monitoring information."
  />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Status | Shaurya Verma" />
  <meta
    property="og:description"
    content="Current uptime and system health for shaurya.online."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://shaurya.online/status/" />
  <link rel="canonical" href="https://shaurya.online/status/" />

  <title>Status • Shaurya Verma</title>

  <link rel="stylesheet" href="/styles.css" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    .note-pill:hover {
      border-color: var(--line-strong);
      transform: translateY(-2px);
    }

    .status-region {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status-badge {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .button-secondary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      border: none;
    }

    .button-secondary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0 0 var(--accent-3);
      }
      70% {
        transform: scale(1.2);
        opacity: 0.7;
        box-shadow: 0 0 0 8px rgba(0,0,0,0);
      }
      100% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(0,0,0,0);
      }
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      background: linear-gradient(135deg, var(--accent-3), var(--accent));
      box-shadow: 0 0 12px var(--accent-3);
      animation: pulse 2.5s infinite ease-out;
      vertical-align: middle;
    }

    .status-badge img:hover {
      opacity: 0.8;
      transition: 1.3s;
    }

    .status-embed {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
      height: 94%;
    }

    .status-embed iframe {
      width: 100%;
      min-height: 640px;
      border: 0;
      display: block;
      margin-top: -100px;
      height: calc(100% + 100px);
    }

    .status-layout {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 1.25rem;
      align-items: stretch;
    }

    .status-summary {
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 640px;
    }

    .status-actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .uptime-button {
      display: inline-flex;
      align-items: center;
      gap: 1.5rem;
      border: 1px solid #9b948f7a ;
      box-shadow: 0 8px 30px rgba(76, 129, 255, 0.16);
    }

    .uptime-button::before {
      content: "●";
      color: var(--accent-3);
      text-shadow: 0 0 10px var(--accent-3);
      font-size: 0.9rem;
    }

    @media (max-width: 980px) {
      .status-layout {
        grid-template-columns: 1fr;
      }

      .status-summary {
        min-height: auto;
      }

      .status-embed iframe {
        min-height: 620px;

        height: calc(100% + 16px);
      }
    }

    .note-pill strong {
      display: inline-flex;
      align-items: center;
    }
  </style>
</head>

<body class="site-ready">

  <div class="noise-layer"></div>
  <div class="grid-mesh"></div>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>

  <main class="section" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="status-layout reveal is-visible">
      <div class="contact-section status-summary">
      
        <p class="eyebrow">System Status</p>

        <h2 style="margin-bottom:1rem;">All systems operational</h2>

        <p class="contact-text">
          Monitoring uptime and performance across all regions.
        </p>

        <div class="note-pill" style="margin-top:1.5rem;">
          <strong>
            <span class="status-dot"></span>
            Operational
          </strong>
          <span id="time"></span>
          <span class="status-region">Asia • Primary monitor</span>
          <span class="status-region">US • UK • EU • AU</span>
        </div>

        <div class="status-actions">
          <a href="https://status.shaurya.online" class="button uptime-button" target="_blank" rel="noopener noreferrer">
            Uptime Monitor
          </a>
          <a href="/" class="button button-secondary">← Back to portfolio</a>
        </div>
      </div>

      <div class="status-embed">
        <iframe
          src="https://status.shaurya.online"
          title="Shaurya status page"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
  </main>
</body>
</html>
